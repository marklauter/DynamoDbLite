name: .NET Test

on:
  push:
    branches: [ "main" ]
    paths: [ "src/**", "tests/**", "Directory.Build.props", "Directory.Packages.props", ".github/workflows/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "src/**", "tests/**", "Directory.Build.props", "Directory.Packages.props", ".github/workflows/**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup-dotnet

    - name: Verify formatting
      run: dotnet format "DynamoDbLite.slnx" --severity info --verify-no-changes

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [ Debug, Release ]
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup-dotnet

    - name: Build
      run: dotnet build "tests/DynamoDbLite.Tests/DynamoDbLite.Tests.csproj" -c ${{ matrix.configuration }}

    - name: Test
      run: dotnet test "tests/DynamoDbLite.Tests/DynamoDbLite.Tests.csproj" -c ${{ matrix.configuration }} --no-build

    - name: Upload coverage report
      if: always() && matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-cobertura
        path: tests/DynamoDbLite.Tests/coverage.cobertura.xml
        if-no-files-found: error

  parity-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [ Debug, Release ]
    steps:
    - uses: actions/checkout@v7
    - uses: ./.github/actions/setup-dotnet

    - name: Build
      run: dotnet build "tests/DynamoDbLite.Parity.Tests/DynamoDbLite.Parity.Tests.csproj" -c ${{ matrix.configuration }}

    - name: Test
      run: dotnet test "tests/DynamoDbLite.Parity.Tests/DynamoDbLite.Parity.Tests.csproj" -c ${{ matrix.configuration }} --no-build

    - name: Upload coverage report
      if: always() && matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-parity-cobertura
        path: tests/DynamoDbLite.Parity.Tests/coverage.cobertura.xml
        if-no-files-found: error
