name: .NET Test

on:
  push:
    branches: [ "main" ]
    paths: [ "src/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "src/**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [ Debug, Release ]
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'src/Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Build
      run: dotnet build "src/DynamoDbLite.slnx" -c ${{ matrix.configuration }}

    - name: Test
      run: dotnet test "src/DynamoDbLite.slnx" -c ${{ matrix.configuration }} --no-build

    - name: Upload coverage report
      if: always() && matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-cobertura
        path: src/DynamoDbLite.Tests/coverage.cobertura.xml
        if-no-files-found: error
